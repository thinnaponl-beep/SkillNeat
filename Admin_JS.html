<script>
/* ==========================================
   1. ส่วนจัดการข้อมูลหลัก (Global Data)
========================================== */
const serverDataElement = document.getElementById('server-data');
var adminData = JSON.parse(serverDataElement.textContent || '{}');

var lessons = [];
var quizzes = [];
var masterData = null;
var users = [];

var currentUserEmail = null;

if (adminData.lessons && typeof adminData.lessons === 'object' && !Array.isArray(adminData.lessons)) {
    var nestedData = adminData.lessons;
    if (nestedData.error) {
        console.error("Permission Denied or Backend Error");
    } else {
        lessons = nestedData.lessons || [];
        quizzes = adminData.allQuizzes || nestedData.allQuizzes || [];
        masterData = nestedData.settings || null;
        users = nestedData.users || [];
    }
} else {
    lessons = Array.isArray(adminData.lessons) ? adminData.lessons : (Array.isArray(adminData) ? adminData : []);
    quizzes = adminData.allQuizzes || [];
    masterData = adminData.settings || null;
    users = adminData.users || [];
}

var sections = [];
lessons.forEach(function(lesson) {
    if (lesson.sections && lesson.sections.length > 0) {
        sections = sections.concat(lesson.sections);
    }
});

if (!masterData || (!masterData.categories && !masterData.departments)) {
    masterData = {
        categories: ['ความรู้ทั่วไป', 'ทักษะวิชาชีพ', 'ความเป็นผู้นำ'],
        departments: ['ทั้งหมด (All)', 'ฝ่ายบุคคล', 'ฝ่ายขาย', 'ฝ่ายการตลาด'],
        positions: ['ทั้งหมด (All)', 'พนักงาน', 'หัวหน้างาน', 'ผู้บริหาร']
    };
}

var activeLessonId = null;
var activeSectionId = null;
var currentEmailTags = []; 
var currentAnswerTags = [];

// JAVIS ADDED: ป้องกัน Error เครื่องหมายคำพูด
function escapeHtml(unsafe) {
    return (unsafe || '').toString()
         .replace(/&/g, "&amp;")
         .replace(/</g, "&lt;")
         .replace(/>/g, "&gt;")
         .replace(/"/g, "&quot;")
         .replace(/'/g, "&#039;");
}

document.addEventListener('DOMContentLoaded', function() {
    renderSettingsLists(); 
    renderMasterDataOptions(); 
    renderLessonsList();
    renderUsersList(); 
    
    if (activeLessonId) {
        renderSectionsList();
        renderQuizzesList();
    }
    
    setupEventListeners();

    if (typeof google !== 'undefined' && google.script) {
        google.script.run.withSuccessHandler(function(res) {
            if(res && res.userInfo) {
                currentUserEmail = res.userInfo.email;
                if (dashboardDataList && dashboardDataList.length > 0) {
                    const sortedUsers = [...dashboardDataList].sort(function(a, b) { return (b.totalBN || 0) - (a.totalBN || 0); });
                    renderLeaderboard(sortedUsers);
                }
            }
        }).getStudentData();
    }
});

/* ==========================================
   2. ระบบหน้า Settings (เพิ่ม/ลบ Master Data)
========================================== */
function renderSettingsLists() {
    let catHtml = '';
    if (masterData.categories) {
        masterData.categories.forEach(function(item) {
            catHtml += '<div class="flex justify-between items-center bg-slate-50 px-3 py-2 rounded-lg border border-slate-100">' +
                '<span class="text-sm font-medium text-slate-700">' + escapeHtml(item) + '</span>' +
                '<button onclick="deleteMasterDataItem(\'categories\', \'' + escapeHtml(item) + '\')" class="text-red-400 hover:text-red-600"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>' +
                '</div>';
        });
    }
    document.getElementById('settings-categories-list').innerHTML = catHtml;

    let deptHtml = '';
    if (masterData.departments) {
        masterData.departments.forEach(function(item) {
            const deleteBtn = item === 'ทั้งหมด (All)' ? '' : '<button onclick="deleteMasterDataItem(\'departments\', \'' + escapeHtml(item) + '\')" class="text-red-400 hover:text-red-600"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>';
            deptHtml += '<div class="flex justify-between items-center bg-slate-50 px-3 py-2 rounded-lg border border-slate-100">' +
                '<span class="text-sm font-medium text-slate-700">' + escapeHtml(item) + '</span>' + deleteBtn + '</div>';
        });
    }
    document.getElementById('settings-departments-list').innerHTML = deptHtml;

    let posHtml = '';
    if (masterData.positions) {
        masterData.positions.forEach(function(item) {
            const deleteBtn = item === 'ทั้งหมด (All)' ? '' : '<button onclick="deleteMasterDataItem(\'positions\', \'' + escapeHtml(item) + '\')" class="text-red-400 hover:text-red-600"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>';
            posHtml += '<div class="flex justify-between items-center bg-slate-50 px-3 py-2 rounded-lg border border-slate-100">' +
                '<span class="text-sm font-medium text-slate-700">' + escapeHtml(item) + '</span>' + deleteBtn + '</div>';
        });
    }
    document.getElementById('settings-positions-list').innerHTML = posHtml;

    renderMasterDataOptions();
}

function addMasterDataItem(type, inputId) {
    const input = document.getElementById(inputId);
    const value = input.value.trim();
    if (!value) return;

    if (!masterData[type]) masterData[type] = [];

    if (!masterData[type].includes(value)) {
        masterData[type].push(value);
        input.value = '';
        renderSettingsLists();
        showAdminToast('กำลังบันทึกข้อมูล...', 'success');
        
        google.script.run.withSuccessHandler(function(res) {
            if(res && res.status !== 'success') {
                showAdminToast('ไม่สามารถเซฟลงชีตได้: ' + res.message, 'error');
            }
        }).saveMasterData(masterData);
    } else {
        showAdminToast('มีชื่อนี้อยู่ในระบบแล้ว', 'error');
    }
}

function deleteMasterDataItem(type, value) {
    if (confirm('ยืนยันการลบ "' + value + '" ออกจากระบบ?')) {
        masterData[type] = masterData[type].filter(function(item) { return item !== value; });
        renderSettingsLists();
        showAdminToast('กำลังลบข้อมูล...', 'success');
        
        google.script.run.withSuccessHandler(function(res) {
            if(res && res.status !== 'success') {
                showAdminToast('ไม่สามารถเซฟลงชีตได้: ' + res.message, 'error');
            }
        }).saveMasterData(masterData);
    }
}

function renderMasterDataOptions() {
    const catSelect = document.getElementById('lesson-category');
    const adminFilterSelect = document.getElementById('admin-lesson-category');
    
    if (masterData.categories) {
        let catHtml = '<option value="">-- ไม่ระบุหมวดหมู่ --</option>';
        let filterHtml = '<option value="">ทุกหมวดหมู่</option>';
        masterData.categories.forEach(function(cat) {
            catHtml += '<option value="' + escapeHtml(cat) + '">' + escapeHtml(cat) + '</option>';
            filterHtml += '<option value="' + escapeHtml(cat) + '">' + escapeHtml(cat) + '</option>';
        });
        if(catSelect) catSelect.innerHTML = catHtml;
        if(adminFilterSelect) adminFilterSelect.innerHTML = filterHtml; 
    }

    const deptContainer = document.getElementById('lesson-departments-container');
    if (deptContainer && masterData.departments) {
        let deptHtml = '';
        masterData.departments.forEach(function(dept) {
            deptHtml += '<label class="flex items-center space-x-3 cursor-pointer p-1.5 hover:bg-slate-100 rounded-lg">' +
                '<input type="checkbox" name="target-dept" value="' + escapeHtml(dept) + '" class="w-4 h-4 text-[#31c1d7] rounded border-slate-300 focus:ring-[#31c1d7]">' +
                '<span class="text-sm text-slate-700 font-medium">' + escapeHtml(dept) + '</span>' +
                '</label>';
        });
        deptContainer.innerHTML = deptHtml;
    }

    const posContainer = document.getElementById('lesson-positions-container');
    if (posContainer && masterData.positions) {
        let posHtml = '';
        masterData.positions.forEach(function(pos) {
            posHtml += '<label class="flex items-center space-x-3 cursor-pointer p-1.5 hover:bg-slate-100 rounded-lg">' +
                '<input type="checkbox" name="target-pos" value="' + escapeHtml(pos) + '" class="w-4 h-4 text-[#31c1d7] rounded border-slate-300 focus:ring-[#31c1d7]">' +
                '<span class="text-sm text-slate-700 font-medium">' + escapeHtml(pos) + '</span>' +
                '</label>';
        });
        posContainer.innerHTML = posHtml;
    }

    const userDeptSelect = document.getElementById('user-department');
    if (userDeptSelect && masterData.departments) {
        let uDeptHtml = '<option value="General">ส่วนกลาง / General</option>';
        masterData.departments.forEach(function(dept) {
            if (dept !== 'ทั้งหมด (All)') uDeptHtml += '<option value="' + escapeHtml(dept) + '">' + escapeHtml(dept) + '</option>';
        });
        userDeptSelect.innerHTML = uDeptHtml;
    }

    const userPosSelect = document.getElementById('user-position');
    if (userPosSelect && masterData.positions) {
        let uPosHtml = '<option value="พนักงานทั่วไป">พนักงานทั่วไป</option>';
        masterData.positions.forEach(function(pos) {
            if (pos !== 'ทั้งหมด (All)') uPosHtml += '<option value="' + escapeHtml(pos) + '">' + escapeHtml(pos) + '</option>';
        });
        userPosSelect.innerHTML = uPosHtml;
    }
}

function showAdminToast(message, type) {
    if (!type) type = 'success';
    const toast = document.createElement('div');
    const icon = type === 'success' 
        ? '<div class="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center mr-3"><svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>'
        : type === 'warning'
        ? '<div class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center mr-3"><svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></div>'
        : '<div class="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center mr-3"><svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg></div>';
    
    toast.className = 'fixed top-6 right-6 flex items-center p-4 bg-white border border-slate-100 rounded-2xl shadow-lg z-[9999] transform transition-all duration-300 translate-x-full opacity-0 max-w-sm';
    toast.innerHTML = icon + '<div><p class="text-sm font-bold text-slate-800">' + escapeHtml(message) + '</p></div>';
    
    document.body.appendChild(toast);
    requestAnimationFrame(function() { toast.classList.remove('translate-x-full', 'opacity-0'); });
    
    setTimeout(function() {
        toast.classList.add('translate-x-full', 'opacity-0');
        setTimeout(function() { toast.remove(); }, 300);
    }, 4000);
}

/* ==========================================
   3. ระบบจัดการบทเรียน (Lessons)
========================================== */
function renderLessonsList() {
    const container = document.getElementById('admin-lessons-list');
    if (!container) return;

    const searchInput = document.getElementById('admin-lesson-search');
    const catFilter = document.getElementById('admin-lesson-category');
    const searchKw = searchInput ? searchInput.value.toLowerCase().trim() : '';
    const filterCat = catFilter ? catFilter.value : '';

    const filteredLessons = lessons.filter(function(lesson) {
        const matchKw = lesson.Title.toLowerCase().includes(searchKw);
        const matchCat = filterCat === '' || lesson.Category === filterCat;
        return matchKw && matchCat;
    });

    if (filteredLessons.length === 0) {
        container.innerHTML = '<div class="text-center p-8 text-slate-400">ไม่พบคอร์สที่ค้นหา</div>';
        return;
    }

    let html = '';
    filteredLessons.forEach(function(lesson) {
        const isActiveStr = lesson.IsActive ? '<span class="text-[10px] bg-[#31c1d7]/10 text-[#31c1d7] px-2 py-0.5 rounded font-bold">เผยแพร่แล้ว</span>' : '<span class="text-[10px] bg-slate-200 text-slate-600 px-2 py-0.5 rounded font-bold">ซ่อน</span>';
        const categoryStr = lesson.Category ? '<span class="text-[10px] border border-[#31c1d7]/30 text-[#31c1d7] px-2 py-0.5 rounded font-bold ml-1.5">' + escapeHtml(lesson.Category) + '</span>' : '';
        
        let targetInfo = '';
        if(lesson.TargetEmails) {
            targetInfo = '<p class="text-[11px] text-indigo-500 mt-1 font-medium">👤 เฉพาะอีเมลที่ระบุ</p>';
        } else if (lesson.TargetDepartments) {
            let shortDept = lesson.TargetDepartments;
            if(shortDept.length > 25) shortDept = shortDept.substring(0, 25) + '...';
            targetInfo = '<p class="text-[11px] text-slate-500 mt-1 font-medium truncate">👥 ' + escapeHtml(shortDept) + '</p>';
        }

        html += '<div class="admin-list-item bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center cursor-pointer hover:border-[#31c1d7]/50 transition-colors ' + (activeLessonId === lesson.LessonID ? 'ring-2 ring-[#31c1d7]/50 bg-[#31c1d7]/5' : '') + '" onclick="selectLesson(\'' + lesson.LessonID + '\')">' +
            '<div class="flex-grow overflow-hidden">' +
            '<h4 class="font-bold text-slate-800 truncate text-sm">' + escapeHtml(lesson.Title) + '</h4>' +
            targetInfo +
            '<div class="mt-2 flex items-center">' +
            isActiveStr + categoryStr +
            '</div>' +
            '</div>' +
            '<div class="flex space-x-1 ml-3 flex-shrink-0">' +
            '<button onclick="event.stopPropagation(); showCourseLearners(\'' + lesson.LessonID + '\')" class="p-1.5 text-blue-500 hover:bg-blue-50 rounded-lg transition-colors" title="ดูผู้เรียนที่เข้าเรียนคอร์สนี้">' +
            '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>' +
            '</button>' +
            '<button onclick="event.stopPropagation(); openLessonModal(\'' + lesson.LessonID + '\')" class="p-1.5 text-[#31c1d7] hover:bg-[#31c1d7]/10 rounded-lg transition-colors" title="แก้ไข">' +
            '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>' +
            '</button>' +
            '<button onclick="event.stopPropagation(); deleteLesson(\'' + lesson.LessonID + '\')" class="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="ลบ">' +
            '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>' +
            '</button>' +
            '</div>' +
            '</div>';
    });
    container.innerHTML = html;
}

function selectLesson(lessonId) {
    activeLessonId = lessonId;
    activeSectionId = null; 
    renderLessonsList();
    renderSectionsList();
    renderQuizzesList();
}

function openLessonModal(lessonId) {
    const modal = document.getElementById('lesson-modal');
    const form = document.getElementById('lesson-form');
    form.reset();

    if (lessonId) {
        const lesson = lessons.find(function(l) { return l.LessonID === lessonId; });
        document.getElementById('lesson-id').value = lesson.LessonID;
        document.getElementById('lesson-title').value = lesson.Title;
        document.getElementById('lesson-desc').value = lesson.Description;
        document.getElementById('lesson-is-active').checked = lesson.IsActive;
        if(lesson.Category) document.getElementById('lesson-category').value = lesson.Category;
        
        currentEmailTags = (lesson.TargetEmails || '').split(',').map(function(s) { return s.trim().toLowerCase(); }).filter(Boolean);
        renderEmailTags();
        document.getElementById('lesson-email-input').value = '';

        if (lesson.TargetDepartments) {
            const depts = lesson.TargetDepartments.split(',').map(function(s) { return s.trim(); });
            document.querySelectorAll('input[name="target-dept"]').forEach(function(box) {
                if (depts.indexOf(box.value) !== -1) box.checked = true;
            });
        }

        if (lesson.TargetPositions) {
            const positions = lesson.TargetPositions.split(',').map(function(s) { return s.trim(); });
            document.querySelectorAll('input[name="target-pos"]').forEach(function(box) {
                if (positions.indexOf(box.value) !== -1) box.checked = true;
            });
        }
        document.getElementById('lesson-modal-title').textContent = 'แก้ไขคอร์สเรียน';
    } else {
        document.getElementById('lesson-id').value = '';
        document.getElementById('lesson-is-active').checked = true;
        
        const firstDept = document.querySelector('input[name="target-dept"][value="ทั้งหมด (All)"]');
        if(firstDept) firstDept.checked = true;
        const firstPos = document.querySelector('input[name="target-pos"][value="ทั้งหมด (All)"]');
        if(firstPos) firstPos.checked = true;

        currentEmailTags = [];
        renderEmailTags();
        document.getElementById('lesson-email-input').value = '';

        document.getElementById('lesson-modal-title').textContent = 'เพิ่มคอร์สเรียนใหม่';
    }
    modal.classList.remove('hidden');
}

function saveLesson(e) {
    e.preventDefault();
    const saveBtn = document.getElementById('save-lesson-btn');
    saveBtn.disabled = true;
    saveBtn.innerHTML = 'กำลังบันทึก...';

    const selectedDepts = [];
    document.querySelectorAll('input[name="target-dept"]:checked').forEach(function(el) { selectedDepts.push(el.value); });
    const selectedPositions = [];
    document.querySelectorAll('input[name="target-pos"]:checked').forEach(function(el) { selectedPositions.push(el.value); });

    const lessonData = {
        LessonID: document.getElementById('lesson-id').value,
        Title: document.getElementById('lesson-title').value,
        Description: document.getElementById('lesson-desc').value,
        Category: document.getElementById('lesson-category').value,
        IsActive: document.getElementById('lesson-is-active').checked,
        TargetDepartments: selectedDepts.join(', '),
        TargetPositions: selectedPositions.join(', '),
        TargetEmails: currentEmailTags.join(',')
    };

    const isNew = !lessonData.LessonID;

    google.script.run
        .withSuccessHandler(function(response) {
            if(response.status === 'success') {
                document.getElementById('lesson-modal').classList.add('hidden');
                if (isNew) {
                    lessonData.LessonID = response.newId || ('TEMP-' + Date.now()); 
                    lessons.push(lessonData);
                    showAdminToast('เพิ่มคอร์สเรียนใหม่เรียบร้อย');
                } else {
                    const idx = lessons.findIndex(function(l) { return l.LessonID === lessonData.LessonID; });
                    if (idx > -1) lessons[idx] = lessonData;
                    showAdminToast('บันทึกการแก้ไขเรียบร้อย');
                }
                renderLessonsList();
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'บันทึกคอร์สเรียน';
            } else {
                showAdminToast('เกิดข้อผิดพลาด: ' + response.message, 'error');
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'บันทึกข้อมูล';
            }
        })
        .saveLesson(lessonData);
}

function deleteLesson(lessonId) {
    if(!confirm('คุณแน่ใจหรือไม่ว่าต้องการลบคอร์สนี้? (วิดีโอและข้อสอบข้างในจะถูกลบด้วย)')) return;
    
    showAdminToast('กำลังลบข้อมูล...');
    google.script.run
        .withSuccessHandler(function(response) {
            if(response.status === 'success') {
                lessons = lessons.filter(function(l) { return l.LessonID !== lessonId; });
                if(activeLessonId === lessonId) {
                    activeLessonId = null;
                    activeSectionId = null;
                }
                renderLessonsList();
                renderSectionsList();
                renderQuizzesList();
                showAdminToast('ลบคอร์สเรียนเรียบร้อย');
            }
        })
        .deleteLesson(lessonId);
}

/* ==========================================
   4. ระบบจัดการวิดีโอ (Sections)
========================================== */

function updateSectionUrlLabel() {
    const type = document.getElementById('section-content-type').value;
    const label = document.getElementById('label-section-url');
    const input = document.getElementById('section-youtube');
    
    if (type === 'youtube') {
        label.textContent = 'YouTube Video ID (เช่น dQw4w9WgXcQ)';
        input.placeholder = 'รหัส หรือ ลิงก์ YouTube';
    } else if (type === 'external') {
        label.textContent = 'URL เว็บไซต์ภายนอก';
        input.placeholder = 'เช่น https://thaimooc.org/...';
    }
}

function renderSectionsList() {
    const container = document.getElementById('admin-sections-list');
    const headerTitle = document.getElementById('section-header-title');
    if (!container) return;

    if (!activeLessonId) {
        container.innerHTML = '<div class="text-center p-8 text-slate-400">กรุณาเลือกคอร์สเรียนด้านซ้ายก่อน</div>';
        headerTitle.textContent = 'วิดีโอ (เลือกคอร์สก่อน)';
        return;
    }

    const lessonSections = sections.filter(function(s) { return s.LessonID === activeLessonId; }).sort(function(a,b) { return a.Order - b.Order; });
    headerTitle.textContent = 'วิดีโอในคอร์ส (' + lessonSections.length + ')';

    if (lessonSections.length === 0) {
        container.innerHTML = '<div class="text-center p-8 text-slate-400 border border-dashed border-slate-200 rounded-xl mt-4">ยังไม่มีวิดีโอในคอร์สนี้</div>';
        return;
    }

    let html = '<div class="space-y-3">';
    lessonSections.forEach(function(sec) {
        const vp = sec.VideoPoints !== undefined ? sec.VideoPoints : 10;
        const qp = sec.QuizPoints !== undefined ? sec.QuizPoints : 50;

        let typeBadge = '';

            '</button>' +
            '</div>' +
            '</div>';
    });
    html += '</div>';
    container.innerHTML = html;
}

function selectSection(sectionId) {
    activeSectionId = sectionId;
    renderSectionsList();
    renderQuizzesList();
}

function openSectionModal(sectionId) {
    if (!activeLessonId && !sectionId) {
        alert('กรุณาเลือกคอร์สเรียนหลักก่อนเพิ่มวิดีโอครับ');
        return;
    }

    const modal = document.getElementById('section-modal');
    const form = document.getElementById('section-form');
    
    if (sectionId && typeof sectionId === 'string') {
        const sec = sections.find(function(s) { return s.SectionID === sectionId; });
        document.getElementById('section-id').value = sec.SectionID;
        document.getElementById('section-lesson-id').value = sec.LessonID;
        document.getElementById('section-title').value = sec.Title;
        document.getElementById('section-youtube').value = sec.YouTubeVideoID;
        document.getElementById('section-order').value = sec.Order;
        
        document.getElementById('section-video-points').value = sec.VideoPoints !== undefined ? sec.VideoPoints : 10;
        document.getElementById('section-quiz-points').value = sec.QuizPoints !== undefined ? sec.QuizPoints : 50;
        
        document.getElementById('section-content-type').value = sec.ContentType || 'youtube';

        document.getElementById('section-modal-title').textContent = 'แก้ไขเนื้อหาย่อย';
    } else {
        form.reset();
        document.getElementById('section-id').value = '';
        document.getElementById('section-lesson-id').value = activeLessonId;
        
        const lessonSections = sections.filter(function(s) { return s.LessonID === activeLessonId; });
        document.getElementById('section-order').value = lessonSections.length + 1;

        document.getElementById('section-video-points').value = 10;
        document.getElementById('section-quiz-points').value = 50;
        
        document.getElementById('section-content-type').value = 'youtube';

        document.getElementById('section-modal-title').textContent = 'เพิ่มเนื้อหาใหม่';
    }
    
    if(typeof updateSectionUrlLabel === 'function') updateSectionUrlLabel();
    
    modal.classList.remove('hidden');
}

function saveSection(e) {
    e.preventDefault();
    const saveBtn = document.getElementById('save-section-btn');
    saveBtn.disabled = true;
    saveBtn.innerHTML = 'กำลังบันทึก...';

    const sectionData = {
        SectionID: document.getElementById('section-id').value,
        LessonID: document.getElementById('section-lesson-id').value,
        Title: document.getElementById('section-title').value,
        YouTubeVideoID: document.getElementById('section-youtube').value, 
        Order: document.getElementById('section-order').value,
        VideoPoints: parseInt(document.getElementById('section-video-points').value) || 0,
        QuizPoints: parseInt(document.getElementById('section-quiz-points').value) || 0,
        ContentType: document.getElementById('section-content-type').value 
    };

    const isNew = !sectionData.SectionID;

    google.script.run
        .withSuccessHandler(function(response) {
            if(response.status === 'success') {
                document.getElementById('section-modal').classList.add('hidden');
                if (isNew) {
                    sectionData.SectionID = response.newId || ('SEC-' + Date.now());
                    sections.push(sectionData);
                    showAdminToast('เพิ่มเนื้อหาใหม่เรียบร้อย');
                } else {
                    const idx = sections.findIndex(function(s) { return s.SectionID === sectionData.SectionID; });
                    if (idx > -1) sections[idx] = sectionData;
                    showAdminToast('บันทึกการแก้ไขเนื้อหาเรียบร้อย');
                }
                renderSectionsList();
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'บันทึกเนื้อหา';
            } else {
                showAdminToast(response.message, 'error');
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'บันทึกข้อมูล';
            }
        })
        .saveSection(sectionData);
}

function deleteSection(sectionId) {
    if(!confirm('ยืนยันการลบเนื้อหานี้?')) return;
    showAdminToast('กำลังลบ...');
    google.script.run
        .withSuccessHandler(function(response) {
            if(response.status === 'success') {
                sections = sections.filter(function(s) { return s.SectionID !== sectionId; });
                if(activeSectionId === sectionId) activeSectionId = null;
                renderSectionsList();
                renderQuizzesList();
                showAdminToast('ลบเนื้อหาเรียบร้อย');
            }
        })
        .deleteSection(sectionId);
}

function renderQuizzesList() {
    const container = document.getElementById('admin-quizzes-list');
    if (!container) return;

    if (!activeSectionId) {
        container.innerHTML = '<div class="text-center p-8 text-slate-400">กรุณาเลือกวิดีโอด้านซ้ายก่อน</div>';
        return;
    }

    const sectionQuizzes = quizzes.filter(function(q) { return q.SectionID === activeSectionId; });
    
    if (sectionQuizzes.length === 0) {
        container.innerHTML = '<div class="text-center p-6 text-slate-400 border border-dashed border-slate-200 rounded-xl mt-4 text-sm">วิดีโอนี้ยังไม่มีแบบทดสอบ</div>';
        return;
    }

    let html = '<div class="space-y-3">';
    sectionQuizzes.forEach(function(quiz, idx) {
        const questionText = quiz.QuestionText || quiz.Question || '';
        const quizId = quiz.QuestionID || quiz.QuizID || '';
        
        let typeBadge = '';
        try {
            const opts = JSON.parse(quiz.Options);
            if (!opts || opts.length === 0) typeBadge = '<span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-bold ml-2">อัตนัย</span>';
            else typeBadge = '<span class="text-[10px] bg-violet-100 text-violet-700 px-2 py-0.5 rounded font-bold ml-2">ปรนัย (' + opts.length + ')</span>';
        } catch(e) {
            typeBadge = '<span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-bold ml-2">อัตนัย</span>';
        }

        html += '<div class="admin-list-item bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-start hover:border-violet-300 transition-colors">' +
            '<div class="flex-grow pr-3">' +
            '<p class="font-bold text-sm text-slate-800">' + (idx + 1) + '. ' + escapeHtml(questionText) + typeBadge + '</p>' +
            '</div>' +
            '<div class="flex space-x-1 flex-shrink-0">' +
            '<button onclick="openQuizModal(\'' + quizId + '\')" class="p-1.5 text-violet-600 hover:bg-violet-100 rounded-lg transition-colors" title="แก้ไข">' +
            '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>' +
            '</button>' +
            '<button onclick="deleteQuiz(\'' + quizId + '\')" class="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="ลบ">' +
            '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>' +
            '</button>' +
            '</div>' +
            '</div>';
    });
    html += '</div>';
    container.innerHTML = html;
}

function toggleQuizType() {
    const type = document.getElementById('quiz-type').value;
    if(type === 'subjective') {
        document.getElementById('multiple-choice-container').classList.add('hidden');
        document.getElementById('subjective-container').classList.remove('hidden');
    } else {
        document.getElementById('multiple-choice-container').classList.remove('hidden');
        document.getElementById('subjective-container').classList.add('hidden');
    }
}

var dynamicOptionCount = 0;
function addQuizOption(value, isCorrect) {
    if (value === undefined) value = '';
    if (isCorrect === undefined) isCorrect = false;
    
    dynamicOptionCount++;
    const container = document.getElementById('dynamic-options-list');
    const div = document.createElement('div');
    div.className = 'flex items-center space-x-3 bg-white p-2 rounded-xl border border-violet-100 option-row shadow-sm';
    
    const checkedAttr = isCorrect ? 'checked' : '';
    
    div.innerHTML = '<input type="radio" name="correct_option" class="w-5 h-5 text-violet-600 focus:ring-violet-500 cursor-pointer ml-2" ' + checkedAttr + '>' +
        '<input type="text" class="quiz-option-input flex-grow px-3 py-2 border-none focus:ring-0 outline-none text-sm" value="' + escapeHtml(value) + '" placeholder="พิมพ์ตัวเลือก...">' +
        '<button type="button" class="text-slate-400 hover:text-red-500 p-2 mr-1 rounded-lg hover:bg-red-50 transition-colors" onclick="this.parentElement.remove()" title="ลบตัวเลือก"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>';
    container.appendChild(div);
}

function renderAnswerTags() {
    const wrapper = document.getElementById('answer-tags-wrapper');
    if(!wrapper) return;
    wrapper.innerHTML = '';
    currentAnswerTags.forEach(function(tag) {
        const span = document.createElement('span');
        span.className = 'inline-flex items-center px-2.5 py-1 rounded-md text-sm font-medium bg-blue-100 text-blue-700 border border-blue-200';
        span.innerHTML = escapeHtml(tag) + '<button type="button" onclick="removeAnswerTag(\'' + escapeHtml(tag) + '\')" class="ml-1.5 inline-flex text-blue-500 hover:text-red-500 focus:outline-none"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>';
        wrapper.appendChild(span);
    });
}

function addAnswerTag(tagStr) {
    const tags = tagStr.split(/[,]+/).map(function(s) { return s.trim(); }).filter(Boolean);
    tags.forEach(function(tag) {
        if (currentAnswerTags.indexOf(tag) === -1) {
            currentAnswerTags.push(tag);
        }
    });
    renderAnswerTags();
    document.getElementById('subjective-answer-input').value = '';
}

function removeAnswerTag(tag) {
    currentAnswerTags = currentAnswerTags.filter(function(t) { return t !== tag; });
    renderAnswerTags();
}

function openQuizModal(quizId) {
    if (!activeSectionId) {
        alert('กรุณาเลือกวิดีโอก่อนเพิ่มข้อสอบครับ');
        return;
    }

    const modal = document.getElementById('quiz-modal');
    const form = document.getElementById('quiz-form');
    
    form.reset();
    document.getElementById('dynamic-options-list').innerHTML = '';
    dynamicOptionCount = 0;
    
    if (quizId && typeof quizId === 'string') {
        const quiz = quizzes.find(function(q) { return (q.QuestionID === quizId || q.QuizID === quizId); });
        document.getElementById('quiz-id').value = quiz.QuestionID || quiz.QuizID;
        document.getElementById('quiz-section-id').value = quiz.SectionID;
        document.getElementById('quiz-question').value = quiz.QuestionText || quiz.Question;
        
        let options = [];
        try { options = JSON.parse(quiz.Options); } catch(e) {}

        const correctAns = quiz.CorrectAnswer || quiz.Answer;

        if (!options || options.length === 0) {
            document.getElementById('quiz-type').value = 'subjective';
            currentAnswerTags = correctAns ? correctAns.split(',').map(function(s) { return s.trim(); }).filter(Boolean) : [];
            renderAnswerTags();
            document.getElementById('subjective-answer-input').value = '';
        } else {
            document.getElementById('quiz-type').value = 'multiple_choice';
            currentAnswerTags = [];
            renderAnswerTags();
            options.forEach(function(opt) {
                addQuizOption(opt, opt === correctAns);
            });
        }
        
        document.getElementById('quiz-modal-title').textContent = 'แก้ไขข้อสอบ';
    } else {
        document.getElementById('quiz-id').value = '';
        document.getElementById('quiz-section-id').value = activeSectionId;
        document.getElementById('quiz-type').value = 'multiple_choice';
        
        currentAnswerTags = [];
        renderAnswerTags();
        addQuizOption('', true);
        addQuizOption('', false);
        
        document.getElementById('quiz-modal-title').textContent = 'เพิ่มข้อสอบใหม่';
    }
    
    toggleQuizType();
    modal.classList.remove('hidden');
}

function saveQuiz(e) {
    e.preventDefault();
    const saveBtn = document.getElementById('save-quiz-btn');
    const type = document.getElementById('quiz-type').value;
    
    let finalOptions = [];
    let finalAnswer = '';

    if (type === 'subjective') {
        const leftover = document.getElementById('subjective-answer-input').value.trim();
        if(leftover) addAnswerTag(leftover);
        
        finalAnswer = currentAnswerTags.join(',');
        if (!finalAnswer) {
            showAdminToast('กรุณาระบุคีย์เวิร์ดคำตอบที่ถูกต้องอย่างน้อย 1 คำ', 'error');
            return;
        }
    } else {
        const rows = document.querySelectorAll('.option-row');
        let isAnyChecked = false;
        rows.forEach(function(row) {
            const val = row.querySelector('.quiz-option-input').value.trim();
            const isChecked = row.querySelector('input[type="radio"]').checked;
            if (val) {
                finalOptions.push(val);
                if (isChecked) {
                    finalAnswer = val;
                    isAnyChecked = true;
                }
            }
        });

        if (finalOptions.length < 2) {
            showAdminToast('ปรนัยต้องมีอย่างน้อย 2 ตัวเลือก', 'error');
            return;
        }
        if (!isAnyChecked) {
            showAdminToast('กรุณาเลือกข้อที่ถูกต้องด้วยครับ', 'error');
            return;
        }
    }

    saveBtn.disabled = true;
    saveBtn.innerHTML = 'กำลังบันทึก...';

    const questionData = {
        id: document.getElementById('quiz-id').value,
        sectionId: document.getElementById('quiz-section-id').value,
        questionText: document.getElementById('quiz-question').value,
        options: finalOptions, 
        correctAnswer: finalAnswer
    };

    const isNew = !questionData.id;

    google.script.run
        .withSuccessHandler(function(response) {
            if(response.status === 'success') {
                document.getElementById('quiz-modal').classList.add('hidden');
                
                if (isNew) {
                    const newRecord = {
                        QuestionID: response.newId || ('QZ-' + Date.now()),
                        SectionID: questionData.sectionId,
                        QuestionText: questionData.questionText,
                        Options: JSON.stringify(questionData.options),
                        CorrectAnswer: questionData.correctAnswer
                    };
                    quizzes.push(newRecord);
                    showAdminToast('เพิ่มข้อสอบใหม่เรียบร้อย');
                } else {
                    const idx = quizzes.findIndex(function(q) { return q.QuestionID === questionData.id || q.QuizID === questionData.id; });
                    if (idx > -1) {
                        quizzes[idx].QuestionText = questionData.questionText;
                        quizzes[idx].Question = questionData.questionText;
                        quizzes[idx].Options = JSON.stringify(questionData.options);
                        quizzes[idx].CorrectAnswer = questionData.correctAnswer;
                        quizzes[idx].Answer = questionData.correctAnswer;
                    }
                    showAdminToast('บันทึกข้อสอบเรียบร้อย');
                }
                renderQuizzesList();
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'บันทึกข้อสอบ';
            } else {
                showAdminToast(response.message, 'error');
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'บันทึกข้อมูล';
            }
        })
        .saveQuestion(questionData); 
}

function deleteQuiz(quizId) {
    if(!confirm('ยืนยันการลบข้อสอบนี้?')) return;
    showAdminToast('กำลังลบ...');
    google.script.run
        .withSuccessHandler(function(response) {
            if(response.status === 'success') {
                quizzes = quizzes.filter(function(q) { return q.QuizID !== quizId && q.QuestionID !== quizId; });
                renderQuizzesList();
                showAdminToast('ลบข้อสอบเรียบร้อย');
            }
        })
        .deleteQuestion(quizId); 
}

function saveUser(e) {

                if (idx > -1) {
                    users[idx].FullName = userData.FullName;
                    users[idx].Nickname = userData.Nickname;
                    users[idx].Department = userData.Department;
                    users[idx].Position = userData.Position;
                }
                
                renderUsersList();
                showAdminToast('บันทึกข้อมูลพนักงานเรียบร้อยแล้ว');
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'บันทึกข้อมูล';
            } else {
                showAdminToast(response.message, 'error');
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'บันทึกข้อมูล';
            }
        })
        .saveUserAdmin(userData);
}

   ฟังก์ชันจัดการระบบ Tag อีเมล และ Tag คำตอบอัตนัย
========================================== */
function renderEmailTags() {
    const wrapper = document.getElementById('email-tags-wrapper');
    if(!wrapper) return;
    wrapper.innerHTML = '';
    currentEmailTags.forEach(function(email) {
        const tag = document.createElement('span');
        tag.className = 'inline-flex items-center px-2.5 py-1 rounded-md text-sm font-medium bg-[#31c1d7]/10 text-[#31c1d7] border border-[#31c1d7]/20';
        tag.innerHTML = escapeHtml(email) + '<button type="button" onclick="removeEmailTag(\'' + escapeHtml(email) + '\')" class="ml-1.5 inline-flex text-[#31c1d7] hover:text-red-500 focus:outline-none"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>';
        wrapper.appendChild(tag);
    });
}

function addEmailTag(emailStr) {
    const emails = emailStr.split(/[\s,]+/).map(function(s) { return s.trim().toLowerCase(); }).filter(Boolean);
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    
    let hasInvalid = false;
    emails.forEach(function(email) {
        if (currentEmailTags.indexOf(email) === -1) {
            if (emailRegex.test(email)) currentEmailTags.push(email);
            else hasInvalid = true;
        }
    });
    
    if(hasInvalid) showAdminToast('ข้ามอีเมลรูปแบบไม่ถูกต้อง', 'error');
    renderEmailTags();
    document.getElementById('lesson-email-input').value = '';
}

function removeEmailTag(email) {
    currentEmailTags = currentEmailTags.filter(function(e) { return e !== email; });
    renderEmailTags();
}

function setupEventListeners() {
    const lessonForm = document.getElementById('lesson-form');
    const sectionForm = document.getElementById('section-form');
    const quizForm = document.getElementById('quiz-form');
    const userForm = document.getElementById('user-form');
    
    if(lessonForm) lessonForm.addEventListener('submit', saveLesson);
    if(sectionForm) sectionForm.addEventListener('submit', saveSection);
    if(quizForm) quizForm.addEventListener('submit', saveQuiz);
    if(userForm) userForm.addEventListener('submit', saveUser);
    
    const emailInput = document.getElementById('lesson-email-input');
    if (emailInput) {
        emailInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ' || e.key === ',') {
                e.preventDefault();
                addEmailTag(this.value);
            }
            if (e.key === 'Backspace' && this.value === '' && currentEmailTags.length > 0) {
                currentEmailTags.pop();
                renderEmailTags();
            }
        });
        emailInput.addEventListener('blur', function() { addEmailTag(this.value); });
    }

    const answerInput = document.getElementById('subjective-answer-input');
    if (answerInput) {
        answerInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                addAnswerTag(this.value);
            }
            if (e.key === 'Backspace' && this.value === '' && currentAnswerTags.length > 0) {
                currentAnswerTags.pop();
                renderAnswerTags();
            }
        });
        answerInput.addEventListener('blur', function() { addAnswerTag(this.value); });
    }
}

let dashboardDataList = []; 

function getRankName(score) {
    const numScore = parseInt(score) || 0;
    if(numScore >= 2000) return 'ปรมาจารย์';
    if(numScore >= 1000) return 'ผู้เชี่ยวชาญ';
    if(numScore >= 500) return 'นักรบ';
    return 'ผู้เริ่มต้น';
}

function loadDashboardData() {
    const tbody = document.getElementById('dashboard-table-body');
    if (tbody) {

    }

    }

    google.script.run
        .withSuccessHandler(function(res) {
            let parsedData = res;
            if (typeof res === 'string') {
                try { parsedData = JSON.parse(res); } 
                catch(e) { console.error("JSON Parse Error:", e); }
            }
            processDashboardData(parsedData);
        })
        .withFailureHandler(function(err) {
            console.error("Dashboard Error:", err);
            showAdminToast("เกิดข้อผิดพลาดในการดึงข้อมูล", "error");
            if (tbody) tbody.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-red-500">เกิดข้อผิดพลาด: ' + escapeHtml(err.message || err) + '</td></tr>';
        })

function processDashboardData(data) {
    const tbody = document.getElementById('dashboard-table-body');

    if (data && data.error) {
        showAdminToast(data.error, "error");
        if (tbody) tbody.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-red-500">' + escapeHtml(data.error) + '</td></tr>';
        return;
    }

    if (!data || !data.students || !Array.isArray(data.students)) {
        if (tbody) tbody.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-slate-500">ไม่พบข้อมูล หรือโหลดข้อมูลล้มเหลว</td></tr>';
        document.getElementById('dash-total-users').innerHTML = '0 <span class="text-sm font-medium text-slate-400">คน</span>';
        document.getElementById('dash-active-users').innerHTML = '0 <span class="text-sm font-medium text-slate-400">คน</span>';
        document.getElementById('dash-total-courses').innerHTML = '0 <span class="text-sm font-medium text-slate-400">วิชา</span>';
        document.getElementById('dash-avg-progress-text').innerText = '0%';
        document.getElementById('dash-avg-progress-bar').style.width = '0%';
        renderLeaderboard([]);
        return;
    }

    dashboardDataList = data.students;

    const totalUsersCount = data.totalStudents || (users ? users.length : 0);
    const activeUsersCount = dashboardDataList.length;
    const totalLessonsCount = data.totalLessons || 0;

    let avgProgress = 0;
    if (totalUsersCount > 0) {
        const totalProgress = dashboardDataList.reduce(function(sum, u) { return sum + (u.progressPercent || 0); }, 0);
        avgProgress = Math.round(totalProgress / totalUsersCount);
    }

    document.getElementById('dash-total-users').innerHTML = totalUsersCount + ' <span class="text-sm font-medium text-slate-400">คน</span>';
    document.getElementById('dash-active-users').innerHTML = activeUsersCount + ' <span class="text-sm font-medium text-slate-400">คน</span>';
    document.getElementById('dash-total-courses').innerHTML = totalLessonsCount + ' <span class="text-sm font-medium text-slate-400">วิชา</span>';

    const pBar = document.getElementById('dash-avg-progress-bar');
    pBar.style.width = avgProgress + '%';
    if (avgProgress >= 80) pBar.className = 'bg-emerald-500 h-2 rounded-full transition-all duration-1000';
    else if (avgProgress >= 40) pBar.className = 'bg-amber-500 h-2 rounded-full transition-all duration-1000';
    else pBar.className = 'bg-[#31c1d7] h-2 rounded-full transition-all duration-1000';
    
    document.getElementById('dash-avg-progress-text').innerText = avgProgress + '%';

    if (dashboardDataList.length === 0) {
        if (tbody) tbody.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-slate-500">ยังไม่มีผู้เรียนที่เริ่มเรียนในระบบ</td></tr>';
        renderLeaderboard([]);
        return;
    }

    const sortedUsers = [...dashboardDataList].sort(function(a, b) { return (b.totalBN || 0) - (a.totalBN || 0); });
    
    renderLeaderboard(sortedUsers);
    renderDashboardTable(sortedUsers);
}

function showUserDetails(email) {
    const user = dashboardDataList.find(function(u) { return u.email === email; });
    if (!user) return;

    document.getElementById('user-details-title').textContent = 'ประวัติการเรียนของ: ' + (user.fullName || user.email);
    const container = document.getElementById('user-details-content');

    if ((!user.completedSections || user.completedSections.length === 0) && (!user.externalProofs || user.externalProofs.length === 0)) {
        container.innerHTML = '<div class="text-center p-8 text-slate-400">ยังไม่เริ่มเรียนคอร์สใดเลย</div>';
        document.getElementById('user-details-modal').classList.remove('hidden');
        return;
    }

    let html = '<div class="space-y-4">';
    lessons.forEach(function(lesson) {
        const lessonSections = sections.filter(function(s) { return s.LessonID === lesson.LessonID; });
        if (lessonSections.length === 0) return;

        let completedCount = 0;
        let totalQuizScore = 0;
        let totalQuizCount = 0;
        let hasActivity = false;

        let sectionsHtml = '';

        lessonSections.forEach(function(sec) {
            const isCompleted = user.completedSections.includes(sec.SectionID);
            if (isCompleted) completedCount++;

            if (user.scores && user.scores[sec.SectionID] !== undefined) {
                totalQuizScore += user.scores[sec.SectionID];
                totalQuizCount++;
                hasActivity = true;
            }

            // จัดการแสดงหลักฐาน (ถ้ามี)
            if (sec.ContentType === 'external') {
                const proof = user.externalProofs ? user.externalProofs.find(function(p) { return p.SectionID === sec.SectionID; }) : null;
                if (proof) {
                    hasActivity = true;
                    let statusBadge = '';
                    let actionBtns = '';
                    
                    if (proof.Status === 'Pending') {
                        statusBadge = '<span class="text-amber-500 bg-amber-50 px-2 py-0.5 rounded text-[10px] font-bold border border-amber-100">⏳ รอตรวจ</span>';
                        actionBtns = '<button onclick="updateProofStatus(\'' + escapeJsString(email) + '\', \'' + escapeJsString(sec.SectionID) + '\', \'Approved\')" class="px-2 py-1 bg-emerald-500 hover:bg-emerald-600 text-white rounded text-[10px] font-bold transition">อนุมัติ</button>' +
                                     '<button onclick="updateProofStatus(\'' + escapeJsString(email) + '\', \'' + escapeJsString(sec.SectionID) + '\', \'Rejected\')" class="px-2 py-1 bg-rose-500 hover:bg-rose-600 text-white rounded text-[10px] font-bold transition">ปฏิเสธ</button>';
                    } else if (proof.Status === 'Approved') {
                        statusBadge = '<span class="text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded text-[10px] font-bold border border-emerald-100">✅ อนุมัติแล้ว</span>';
                    } else {
                        statusBadge = '<span class="text-rose-600 bg-rose-50 px-2 py-0.5 rounded text-[10px] font-bold border border-rose-100">❌ ไม่อนุมัติ</span>';
                    }
                    
                    sectionsHtml += '<div class="mt-2 p-2 bg-slate-50 border border-slate-100 rounded-lg flex flex-col sm:flex-row sm:items-center justify-between gap-2">' +
                        '<div class="flex items-center gap-2">' +
                            '<span class="text-xs font-bold text-slate-700">' + escapeHtml(sec.Title) + '</span>' +
                            '<a href="' + escapeHtml(proof.FileUrl) + '" target="_blank" class="text-blue-500 hover:text-blue-700 hover:underline text-[11px] font-bold flex items-center gap-1">🖼️ ดูรูปหลักฐาน</a>' +
                            statusBadge +
                        '</div>' +
                        '<div class="flex gap-2" id="proof-action-' + sec.SectionID + '">' + actionBtns + '</div>' +
                    '</div>';
                }
            }
        });

        if (completedCount > 0 || hasActivity) {
            const progress = Math.round((completedCount / lessonSections.length) * 100);
            const avgScore = totalQuizCount > 0 ? Math.round((totalQuizScore / totalQuizCount) * 100) : 0;
            const isCourseCompleted = progress === 100;

            html += '<div class="bg-white p-4 rounded-2xl border ' + (isCourseCompleted ? 'border-emerald-200 shadow-sm' : 'border-slate-200 hover:border-[#31c1d7]/30') + ' transition-all">' +
                '<div class="flex justify-between items-start mb-2">' +
                    '<h4 class="font-bold text-slate-800 text-sm">' + escapeHtml(lesson.Title) + '</h4>' +
                    (isCourseCompleted ? '<span class="px-2 py-1 bg-emerald-100 text-emerald-600 text-[10px] font-bold rounded-lg flex-shrink-0 ml-2">เรียนจบแล้ว</span>' : '<span class="px-2 py-1 bg-[#31c1d7]/10 text-[#31c1d7] text-[10px] font-bold rounded-lg flex-shrink-0 ml-2">กำลังเรียน</span>') +
                '</div>' +
                '<div class="flex items-center gap-4 text-sm mt-3">' +
                    '<div class="flex-grow">' +
                        '<div class="flex justify-between text-[11px] font-bold text-slate-500 mb-1"><span>ความคืบหน้า (' + completedCount + '/' + lessonSections.length + ' ตอน)</span><span class="' + (isCourseCompleted ? 'text-emerald-500' : 'text-[#31c1d7]') + '">' + progress + '%</span></div>' +
                        '<div class="w-full bg-slate-100 rounded-full h-1.5"><div class="' + (isCourseCompleted ? 'bg-emerald-500' : 'bg-[#31c1d7]') + ' h-1.5 rounded-full" style="width: ' + progress + '%"></div></div>' +
                    '</div>' +
                    (totalQuizCount > 0 ? '<div class="flex-shrink-0 text-center pl-4 border-l border-slate-100"><div class="text-[10px] font-bold text-slate-400">คะแนนสอบ</div><div class="font-black text-violet-600 text-lg">' + avgScore + '%</div></div>' : '') +
                '</div>' +
                sectionsHtml +
            '</div>';
        }
    });
    html += '</div>';

    container.innerHTML = html || '<div class="text-center p-8 text-slate-400">ยังไม่เริ่มเรียนคอร์สใดเลย</div>';
    document.getElementById('user-details-modal').classList.remove('hidden');
}

// JAVIS ADDED: ฟังก์ชันเรียกใช้งานหลังบ้านเพื่ออัปเดตสถานะรูปรอตรวจสอบ
function updateProofStatus(email, sectionId, newStatus) {
    if (!confirm('ยืนยันที่จะ ' + (newStatus === 'Approved' ? 'อนุมัติ' : 'ปฏิเสธ') + ' หลักฐานนี้ใช่หรือไม่?')) return;
    
    const container = document.getElementById('proof-action-' + sectionId);
    if (container) container.innerHTML = '<span class="text-xs text-slate-400">กำลังบันทึก...</span>';
    
    google.script.run
        .withSuccessHandler(function(res) {
            if (res.status === 'success') {
                showAdminToast('บันทึกสถานะเรียบร้อยแล้ว');
                // โหลดข้อมูล Dashboard ใหม่เพื่อให้อัปเดตตารางและเปอร์เซ็นต์
                loadDashboardData();
                // ปิด Modal ประวัติการเรียน เพื่อให้แอดมินกดเปิดใหม่ จะได้เห็นข้อมูลอัปเดตล่าสุด
                document.getElementById('user-details-modal').classList.add('hidden');
            } else {
                showAdminToast('เกิดข้อผิดพลาด: ' + res.message, 'error');
                if (container) container.innerHTML = '<span class="text-xs text-red-500">ล้มเหลว</span>';
            }
        })
        .adminUpdateProofStatus(email, sectionId, newStatus);
}

function showCourseLearners(lessonId) {
    const lesson = lessons.find(function(l) { return l.LessonID === lessonId; });
    if (!lesson) return;

    document.getElementById('course-learners-title').textContent = 'ผู้เข้าเรียน: ' + lesson.Title;
    const container = document.getElementById('course-learners-content');

    const lessonSections = sections.filter(function(s) { return s.LessonID === lessonId; }).map(function(s) { return s.SectionID; });
    
    if (!dashboardDataList || dashboardDataList.length === 0) {
        container.innerHTML = '<div class="text-center p-8 text-slate-400"><svg class="animate-spin h-5 w-5 mx-auto text-[#31c1d7] mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>กำลังดึงข้อมูลส่วนกลาง โปรดรอสักครู่... (หรือลองเข้าไปที่แท็บ "รายงานผู้เรียน" ก่อน)</div>';
        
        if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(function(res) {
                let parsed = res;
                if(typeof res === 'string') try { parsed = JSON.parse(res); } catch(e){}
                if(parsed && parsed.students) { dashboardDataList = parsed.students; showCourseLearners(lessonId); }
            }).getDashboardStats();
        }
        document.getElementById('course-learners-modal').classList.remove('hidden');
        return;
    }

    if (lessonSections.length === 0) {
        container.innerHTML = '<div class="text-center p-8 text-slate-400">คอร์สนี้ยังไม่มีการเพิ่มวิดีโอเนื้อหาเลยครับ</div>';
        document.getElementById('course-learners-modal').classList.remove('hidden');
        return;
    }

    const learners = [];
    dashboardDataList.forEach(function(user) {
        let completedCount = 0;
        lessonSections.forEach(function(secId) {
            if (user.completedSections && user.completedSections.includes(secId)) {
                completedCount++;
            }
        });
        if (completedCount > 0) {
            learners.push({
                user: user,
                progress: Math.round((completedCount / lessonSections.length) * 100)
            });
        }
    });

    learners.sort(function(a, b) { return b.progress - a.progress; });

    if (learners.length === 0) {
        container.innerHTML = '<div class="text-center p-8 text-slate-400">ยังไม่มีพนักงานเริ่มเรียนคอร์สนี้ครับ</div>';
        document.getElementById('course-learners-modal').classList.remove('hidden');
        return;
    }

    let html = '<div class="space-y-3">';
    learners.forEach(function(data) {
        const u = data.user;
        const isCompleted = data.progress === 100;
        const img = u.profileImage || 'https://ui-avatars.com/api/?name='+encodeURIComponent(u.fullName || u.email)+'&background=31c1d7&color=fff';
        
        html += '<div class="flex items-center justify-between p-3 bg-white border border-slate-100 rounded-xl shadow-sm hover:shadow-md transition-shadow">' +
            '<div class="flex items-center gap-3">' +
                '<img src="' + escapeHtml(img) + '" class="w-10 h-10 rounded-full object-cover border border-slate-200">' +
                '<div>' +
                    '<h4 class="text-sm font-bold text-slate-800">' + escapeHtml(u.fullName || u.email) + '</h4>' +
                    '<p class="text-[11px] text-slate-500">' + escapeHtml(u.department || 'General') + '</p>' +
                '</div>' +
            '</div>' +
            '<div class="text-right">' +
                '<span class="inline-block px-2 py-0.5 ' + (isCompleted ? 'bg-emerald-100 text-emerald-600' : 'bg-[#31c1d7]/10 text-[#31c1d7]') + ' text-[10px] font-bold rounded-lg mb-1">' + (isCompleted ? 'เรียนจบแล้ว' : 'กำลังเรียน') + '</span>' +
                '<div class="flex items-center gap-2 justify-end">' +
                    '<div class="w-16 bg-slate-100 rounded-full h-1.5"><div class="' + (isCompleted ? 'bg-emerald-500' : 'bg-[#31c1d7]') + ' h-1.5 rounded-full" style="width: ' + data.progress + '%"></div></div>' +
                    '<div class="text-xs font-black text-slate-700">' + data.progress + '%</div>' +
                '</div>' +
            '</div>' +
        '</div>';
    });
    html += '</div>';

    container.innerHTML = html;
    document.getElementById('course-learners-modal').classList.remove('hidden');
}

document.getElementById('dashboard-search')?.addEventListener('input', function(e) {
    const keyword = e.target.value.toLowerCase().trim();
    if (!dashboardDataList) return;
    
    const filteredUsers = dashboardDataList.filter(function(u) {
        return (u.fullName && u.fullName.toLowerCase().includes(keyword)) || 
               (u.email && u.email.toLowerCase().includes(keyword)) || 
               (u.department && u.department.toLowerCase().includes(keyword)) ||
               (u.position && u.position.toLowerCase().includes(keyword));
    });
    
    filteredUsers.sort(function(a, b) { return (b.totalBN || 0) - (a.totalBN || 0); });
    renderDashboardTable(filteredUsers);
});

function exportDashboardData(format) {
    if (!dashboardDataList || dashboardDataList.length === 0) {
        alert('ไม่พบข้อมูลสำหรับส่งออก');
        return;
    }

    if (format === 'csv') {
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
        csvContent += "อันดับ,อีเมลพนักงาน,ชื่อ-นามสกุล,แผนก,ตำแหน่ง,ความคืบหน้า (%),จำนวนตอนที่ดูจบ,คะแนน BN Score,Rank (ยศ)\r\n";
        
        const exportData = [...dashboardDataList].sort(function(a, b) { return (b.totalBN || 0) - (a.totalBN || 0); });

        exportData.forEach(function(user, idx) {
            const globalRank = idx + 1;
            const completedSections = user.completedSections ? user.completedSections.length : 0;
            const rankName = getRankName(user.totalBN);
            
            csvContent += globalRank + ',"' + (user.email || '') + '","' + (user.fullName || '') + '","' + (user.department || '') + '","' + (user.position || '') + '",' + (user.progressPercent || 0) + ',' + completedSections + ',' + (user.totalBN || 0) + ',"' + rankName + '"\r\n';
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        
        const dateStr = new Date().toISOString().split('T')[0];
        link.setAttribute("download", "HR_Academy_Report_" + dateStr + ".csv");
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
}
