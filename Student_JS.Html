function showView(viewId) {
    Object.values(views).forEach(function(v) {
        if (v === views.videoPlayer && isMiniPlayer) {

        } else {

document.addEventListener('DOMContentLoaded', function() {
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    let urlParams = new URLSearchParams('');
    if (typeof google !== 'undefined' && google.script && google.script.url) {
        google.script.url.getLocation(function(location) {
            urlParams = new URLSearchParams(location.parameter);
            initApp(urlParams);
        });
    } else {
        urlParams = new URLSearchParams(window.location.search);
        initApp(urlParams);
    }
});

function initApp(urlParams) {
    const tab = urlParams.get('tab');
    if (tab === 'mycourses') {
        showView('myCoursesView');

   3. ฟังก์ชันคำนวณและช่วยเหลือ (Helpers)
========================================== */

// ป้องกัน Syntax Error 
function escapeHtml(unsafe) {
    return (unsafe || '').toString()
         .replace(/&/g, "&amp;")
         .replace(/</g, "&lt;")
         .replace(/>/g, "&gt;")
         .replace(/"/g, "&quot;")
         .replace(/'/g, "&#039;");
}

function escapeJsString(unsafe) {
    return (unsafe || '').toString()
         .replace(/\\/g, "\\\\")
         .replace(/'/g, "\\'")
         .replace(/"/g, "\\\"");
}

function getLessonProgressStats(lesson) {
    if (!lesson.sections || lesson.sections.length === 0) return { total: 0, done: 0, percent: 0, isCompleted: false };
    const total = lesson.sections.length;
    
    // อัปเดตให้รองรับเงื่อนไขเรียนจบ: ต้องดูจบ(หรือแอดมินอนุมัติ) และต้องสอบผ่าน
    const done = lesson.sections.filter(function(s) {
        const secId = String(s.SectionID).trim();
        const isVideoWatched = userInfo.progress.some(function(id) { return String(id).trim() === secId; });
        
        let isQuizPassed = true; 
        if (s.hasQuiz) {
            if (s.quizScore && s.quizScore.TotalQuestions > 0) {
                isQuizPassed = (s.quizScore.Score / s.quizScore.TotalQuestions) >= 0.5; 
            } else {
                isQuizPassed = false; 
            }
        }
        return isVideoWatched && isQuizPassed;
    }).length;
    
    const percent = total > 0 ? Math.round((done / total) * 100) : 0;
    return { total: total, done: done, percent: percent, isCompleted: done === total && total > 0 };
}

function getActualContentType(section) {
    return section.ContentType === 'external' ? 'external' : 'youtube';
}

function getThumbnailUrl(lesson) {
    if (lesson.sections && lesson.sections.length > 0) {
        const firstSec = lesson.sections[0];
        const cType = getActualContentType(firstSec);
        
        if (cType === 'external') {
            return 'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80';
        } else if (firstSec.YouTubeVideoID) {
            let ytId = firstSec.YouTubeVideoID;
            if (ytId.includes('v=')) ytId = ytId.split('v=')[1].split('&')[0];
            else if (ytId.includes('youtu.be/')) ytId = ytId.split('youtu.be/')[1].split('?')[0];
            return 'https://img.youtube.com/vi/' + ytId + '/maxresdefault.jpg';
        }
    }
    return 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80';
}

function showToast(message, type) {
    if (!type) type = 'success';
    const toast = document.createElement('div');
    const icon = type === 'success' 
        ? '<div class="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center mr-3"><svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>'
        : '<div class="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center mr-3"><svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg></div>';
    
    toast.className = 'fixed top-6 right-6 flex items-center p-4 bg-white/95 backdrop-blur-xl border border-slate-100 rounded-2xl shadow-xl z-[9999] transform transition-all duration-300 translate-x-full opacity-0 max-w-sm';
    toast.innerHTML = icon + '<div><p class="text-sm font-bold text-slate-800">' + escapeHtml(message) + '</p></div>';
    
    document.body.appendChild(toast);
    requestAnimationFrame(function() { toast.classList.remove('translate-x-full', 'opacity-0'); });
    
    setTimeout(function() {
        toast.classList.add('translate-x-full', 'opacity-0');
        setTimeout(function() { toast.remove(); }, 300);
    }, 3000);
}

function downloadCertificate(lessonId) {
    const lesson = lessons.find(function(l) { return l.LessonID === lessonId; });
    if (!lesson) return;

    let fullName = userInfo.profile ? userInfo.profile.FullName : '';
    if (!fullName) fullName = userInfo.profile ? userInfo.profile.Nickname : '';
    if (!fullName) fullName = userInfo.email.split('@')[0];

    document.getElementById('cert-name').innerText = fullName;
    document.getElementById('cert-course').innerText = lesson.Title;

    showToast('กำลังสร้างใบประกาศนียบัตร กรุณารอสักครู่...', 'success');

    const certNode = document.getElementById('certificate-template');
    
    html2canvas(certNode, {
        scale: 2, 
        useCORS: true, 
        backgroundColor: null
    }).then(function(canvas) {
        const imgData = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        const safeTitle = lesson.Title.replace(/[^a-zA-Z0-9ก-๙]/g, '_');
        link.download = 'Certificate_' + safeTitle + '.png';
        link.href = imgData;
        link.click();
        
        showToast('ดาวน์โหลดใบประกาศนียบัตรสำเร็จ! 🎓', 'success');
    }).catch(function(err) {
        console.error("Error creating certificate:", err);
        showToast('เกิดข้อผิดพลาดในการสร้างใบประกาศ', 'error');
    });
}

function fetchHomeLeaderboard() {
    if (cachedLeaderboardData !== null) {
        renderHomeLeaderboard(cachedLeaderboardData);
        return;
    }
    if (isFetchingLeaderboard) return;
    isFetchingLeaderboard = true;

    google.script.run
        .withSuccessHandler(function(data) {
            cachedLeaderboardData = data; 
            isFetchingLeaderboard = false;
            renderHomeLeaderboard(data);
        })
        .withFailureHandler(function(err) {
            isFetchingLeaderboard = false;
            console.error('Failed to fetch leaderboard:', err);
        })
        .getPublicLeaderboard();
}

        html += '<div class="w-full h-px bg-slate-100 my-3 relative"><span class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white px-2 text-[10px] font-bold text-slate-300">อันดับของคุณ</span></div>';

        '</header>';

    html += '<div class="flex items-center gap-3.5 mb-6">' +
        '<div class="w-12 h-12 rounded-2xl bg-amber-100 border border-amber-200 flex items-center justify-center shadow-inner flex-shrink-0">' +
            '<span class="text-2xl drop-shadow-sm">⏳</span>' +

// JAVIS UPDATE: ฟังก์ชันแสดงรายละเอียดบทเรียน รองรับการแสดงสถานะ "รอตรวจหลักฐาน"
function showLessonDetails(lessonId) {
    const lesson = lessons.find(function(l) { return l.LessonID === lessonId; });
    if (!lesson) return;
    
    const modal = document.getElementById('lesson-details-modal');
    const content = document.getElementById('lesson-details-content');
    const thumbnailUrl = getThumbnailUrl(lesson);
    const stats = getLessonProgressStats(lesson);
    const safeLessonId = escapeJsString(lesson.LessonID);

    let certBtn = stats.isCompleted ? '<button onclick="downloadCertificate(\'' + safeLessonId + '\')" class="mt-3 sm:mt-0 px-3 py-1.5 bg-amber-50 text-amber-600 hover:bg-amber-500 hover:text-white rounded-lg font-bold text-xs transition-all shadow-sm border border-amber-200 flex items-center gap-1"><span class="text-sm">🎓</span> รับใบประกาศ</button>' : '';

    let html = '<div class="flex justify-between items-start mb-8">' +
        '<div class="flex space-x-6 items-start">' +
        '<img src="' + escapeHtml(thumbnailUrl) + '" class="w-32 h-24 object-cover rounded-2xl shadow-sm hidden sm:block">' +
        '<div><h2 class="text-2xl sm:text-3xl font-extrabold text-slate-800 leading-tight mb-2">' + escapeHtml(lesson.Title) + '</h2>' +
        '<div class="flex items-center space-x-3 text-sm flex-wrap gap-y-2"><span class="px-2.5 py-1 bg-slate-100 text-slate-600 rounded-lg font-bold">' + lesson.sections.length + ' บทเรียน</span>' +
        '<span class="' + (stats.isCompleted ? 'text-emerald-500' : 'text-[#31c1d7]') + ' font-bold">' + (stats.isCompleted ? 'เรียนจบแล้ว' : 'เรียนไปแล้ว ' + stats.done + '/' + stats.total) + '</span>' +
        certBtn +
        '</div></div></div>' +
        '<button onclick="closeLessonDetailsModal()" class="text-slate-400 hover:text-slate-800 bg-slate-50 hover:bg-slate-100 rounded-full p-2 transition-colors flex-shrink-0"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>' +
        '</div>';

    if (lesson.Description) {
        html += '<div class="mb-8 p-5 bg-slate-50 rounded-2xl text-slate-600 text-sm leading-relaxed border border-slate-100">' + escapeHtml(lesson.Description) + '</div>';
    }

    html += '<div class="space-y-4">';
    lesson.sections.forEach(function(sec, index) {
        const isDone = userInfo.progress.some(function(id) { return String(id).trim() === String(sec.SectionID).trim(); });
        const isPending = sec.externalProof && sec.externalProof.Status === 'Pending';
        const isRejected = sec.externalProof && sec.externalProof.Status === 'Rejected';

        // ปรับไอคอน
        let icon = '';
        if (isDone) {
            icon = '<div class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-500 flex items-center justify-center flex-shrink-0 shadow-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>';
        } else if (isPending) {
            icon = '<div class="w-8 h-8 rounded-full bg-amber-100 text-amber-500 flex items-center justify-center flex-shrink-0 shadow-sm"><svg class="animate-spin w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>';
        } else if (isRejected) {
             icon = '<div class="w-8 h-8 rounded-full bg-rose-100 text-rose-500 flex items-center justify-center flex-shrink-0 shadow-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg></div>';
        } else {
            icon = '<div class="w-8 h-8 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center flex-shrink-0 font-bold text-sm shadow-sm">' + (index + 1) + '</div>';
        }
        
        let subText = sec.hasQuiz ? '<span class="text-violet-500 bg-violet-50 px-2 py-0.5 rounded text-[10px] uppercase tracking-wider ml-3 border border-violet-100">มีแบบทดสอบ</span>' : '';
        let passedQuiz = false;
        
        if (sec.quizScore) {
            passedQuiz = (sec.quizScore.Score / sec.quizScore.TotalQuestions) >= 0.5;
            subText += passedQuiz ? '<span class="text-emerald-500 text-xs ml-3">สอบผ่านแล้ว</span>' : '<span class="text-rose-500 text-xs ml-3">สอบไม่ผ่าน</span>';
        }

        let actionBtn = '';
        if (isDone) {
            actionBtn = '<div class="flex items-center gap-2 mt-2 sm:mt-0">';
            actionBtn += '<button onclick="playSection(\'' + safeLessonId + '\', ' + index + ')" class="px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl font-bold text-xs transition-all" title="ดูซ้ำ">ทบทวน</button>';
            if (sec.hasQuiz && !passedQuiz) {
                actionBtn += '<button onclick="startQuizDirectly(\'' + safeLessonId + '\', ' + index + ')" class="px-4 py-2 bg-violet-500 text-white hover:bg-violet-600 shadow-sm shadow-violet-500/30 rounded-xl font-bold text-xs transition-all flex items-center gap-1">' +
                    '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg> สอบเลย' +
                '</button>';
            }
            actionBtn += '</div>';
        } else if (isPending) {
            actionBtn = '<div class="flex items-center gap-2 mt-2 sm:mt-0">';
            actionBtn += '<button class="px-4 py-2 bg-amber-50 border border-amber-200 text-amber-600 rounded-xl font-bold text-xs cursor-default">⏳ รอตรวจหลักฐาน</button>';
            // ถ้าส่งหลักฐานแล้ว (รอตรวจ) แต่ยังมีสอบ ก็สามารถกดสอบได้เลย
            if (sec.hasQuiz && !passedQuiz) {
                actionBtn += '<button onclick="startQuizDirectly(\'' + safeLessonId + '\', ' + index + ')" class="px-4 py-2 bg-violet-500 text-white hover:bg-violet-600 shadow-sm shadow-violet-500/30 rounded-xl font-bold text-xs transition-all flex items-center gap-1">' +
                    '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg> สอบเลย' +
                '</button>';
            }
            actionBtn += '</div>';
        } else {
            const btnText = isRejected ? 'ส่งหลักฐานใหม่' : 'เริ่มเรียน';
            const btnClass = isRejected ? 'bg-rose-500 hover:bg-rose-600 shadow-rose-500/20' : 'bg-[#31c1d7] hover:bg-[#1eb0c6] shadow-[#31c1d7]/20';
            
            actionBtn = '<div class="flex items-center gap-2 mt-2 sm:mt-0">';
            actionBtn += '<button onclick="playSection(\'' + safeLessonId + '\', ' + index + ')" class="px-5 py-2 ' + btnClass + ' text-white shadow-sm rounded-xl font-bold text-sm transition-all">' + btnText + '</button>';
            if (sec.hasQuiz && !passedQuiz) {
                actionBtn += '<button onclick="startQuizDirectly(\'' + safeLessonId + '\', ' + index + ')" class="px-4 py-2 bg-violet-500 text-white hover:bg-violet-600 shadow-sm shadow-violet-500/30 rounded-xl font-bold text-xs transition-all flex items-center gap-1">' +
                    '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg> สอบเลย' +
                '</button>';
            }
            actionBtn += '</div>';
        }

        let bgClass = 'bg-white border-slate-100 hover:border-[#31c1d7]/40';
        if (isDone) bgClass = 'bg-emerald-50/30 border-emerald-100';
        else if (isPending) bgClass = 'bg-amber-50/30 border-amber-100';
        else if (isRejected) bgClass = 'bg-rose-50/30 border-rose-100';

        html += '<div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 border rounded-2xl transition-all group ' + bgClass + '">' +
            '<div class="flex items-center space-x-4 mb-2 sm:mb-0"><div class="flex-shrink-0">' + icon + '</div>' +
            '<div><h4 class="text-[15px] font-bold text-slate-800 group-hover:text-[#31c1d7] transition-colors">' + escapeHtml(sec.Title) + ' ' + subText + '</h4>';
            
        if (isRejected) {
             html += '<p class="text-xs font-bold text-rose-500 mt-1">หลักฐานไม่ผ่านการอนุมัติ กรุณาส่งใหม่</p>';
        }
            
        html += '</div></div>' + actionBtn + '</div>';
    });
    html += '</div>';

    content.innerHTML = html;
    modal.classList.remove('hidden');
}

function closeLessonDetailsModal() {
    document.getElementById('lesson-details-modal').classList.add('hidden');
    renderLessonList();
    renderMyCourses();
}

/* ==========================================
   7. ระบบเล่นวิดีโอ (YouTube Player) & คอร์สภายนอก
========================================== */

function minimizeVideo(backViewStr) {
    const section = currentLesson.sections[currentSectionIndex];
    const contentType = getActualContentType(section);
    
    // ถ้าย่อวิดีโอตอนที่เป็นเว็บนอก จะปิดไปเลย
    if(contentType !== 'youtube') {
        closeVideo();
        showView(backViewStr);
        return;
    }
    
    isMiniPlayer = true;
    views.videoPlayer.classList.add('fixed', 'bottom-6', 'right-6', 'w-80', 'sm:w-96', 'z-[200]', 'transition-all', 'duration-500');
    document.getElementById('video-back-btn').classList.add('hidden');
    document.getElementById('video-header').classList.add('hidden');
    const wrapper = document.getElementById('video-wrapper');
    wrapper.classList.remove('p-6', 'sm:p-8', 'shadow-xl', 'border', 'border-slate-100', 'bg-white');
    wrapper.classList.add('shadow-2xl', 'rounded-2xl', 'overflow-hidden');
    document.getElementById('mini-player-controls').classList.remove('hidden');
    showView(backViewStr);
}

function expandVideo() {
    isMiniPlayer = false;
    views.videoPlayer.classList.remove('fixed', 'bottom-6', 'right-6', 'w-80', 'sm:w-96', 'z-[200]', 'transition-all', 'duration-500');
    document.getElementById('video-back-btn').classList.remove('hidden');
    document.getElementById('video-header').classList.remove('hidden');
    const wrapper = document.getElementById('video-wrapper');
    wrapper.classList.add('p-6', 'sm:p-8', 'shadow-xl', 'border', 'border-slate-100', 'bg-white');
    wrapper.classList.remove('shadow-2xl', 'rounded-2xl', 'overflow-hidden');
    const miniCtrls = document.getElementById('mini-player-controls');
    if (miniCtrls) miniCtrls.classList.add('hidden');
    showView('videoPlayer');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeVideo() {
    isMiniPlayer = false;
    if (player && typeof player.destroy === 'function') {
        player.destroy();
        player = null;
    }
    if (progressSaveTimeout) {
        clearInterval(progressSaveTimeout);
        progressSaveTimeout = null;
    }
    if (videoTrackerInterval) {
        clearInterval(videoTrackerInterval);
        videoTrackerInterval = null;
    }

function loadYouTubePlayer(videoId, startSeconds) {
    if (typeof YT === 'undefined' || typeof YT.Player === 'undefined') {
        setTimeout(function() { loadYouTubePlayer(videoId, startSeconds); }, 500);
        return;
    }
    player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: videoId,
        playerVars: { 'autoplay': 1, 'start': startSeconds, 'rel': 0, 'modestbranding': 1, 'playsinline': 1 },
        events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
    });
}

function onPlayerReady(event) { }

function onPlayerStateChange(event) {
    const ppIcon = document.getElementById('play-pause-icon');
    
    if (event.data == YT.PlayerState.PLAYING || event.data == YT.PlayerState.BUFFERING) {
        checkVideoSkip();
    }

    if (event.data == YT.PlayerState.PLAYING) {
        if (progressSaveTimeout) clearInterval(progressSaveTimeout);
        progressSaveTimeout = setInterval(saveVideoProgress, 10000); 
        
        if (!videoTrackerInterval) {
            videoTrackerInterval = setInterval(checkVideoSkip, 500);
        }

        if (ppIcon) ppIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
    } else {
        if (progressSaveTimeout) clearInterval(progressSaveTimeout);
        
        if (event.data == YT.PlayerState.PAUSED && ppIcon) {
            ppIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
        }
    }

    if (event.data == YT.PlayerState.ENDED) {
        if (videoTrackerInterval) {
            clearInterval(videoTrackerInterval);
            videoTrackerInterval = null;
        }
        if (isMiniPlayer) expandVideo();
        showVideoEndedMessage();
    }
}

function checkVideoSkip() {
    if (player && typeof player.getCurrentTime === 'function') {
        const currentTime = player.getCurrentTime();
        const section = currentLesson.sections[currentSectionIndex];
        
        const sectionIdSafe = String(section.SectionID).trim();
        const isAlreadyCompleted = userInfo.progress.some(function(id) { return String(id).trim() === sectionIdSafe; });
        const isSuperAdminUser = document.querySelector('a[data-page="superadmin"]') !== null;
        
        if (isSuperAdminUser || isAlreadyCompleted) {
            if (currentTime > maxTimeWatched) maxTimeWatched = currentTime;
            return;
        }

        if (currentTime > maxTimeWatched + 2) {
            player.seekTo(maxTimeWatched); 
            showToast('ไม่อนุญาตให้กรอวิดีโอข้ามเนื้อหาครับ 🚫', 'error');
        } else {
            if (currentTime > maxTimeWatched) {
                maxTimeWatched = currentTime;
            }
        }
    }
}

function saveVideoProgress() {
    if (player && typeof player.getCurrentTime === 'function') {
        const sectionId = currentLesson.sections[currentSectionIndex].SectionID;
        google.script.run.updateLatestTimestamp({ sectionId: sectionId, timestamp: Math.floor(maxTimeWatched) });
    }
}

function handleExternalProofUpload(event) {
    const file = event.target.files[0];
    if (file) {
        if (file.size > 5 * 1024 * 1024) { 
            showToast('ขนาดไฟล์รูปภาพใหญ่เกินไป (ไม่เกิน 5MB)', 'error');
            return;
        }
        currentExternalProofMimeType = file.type;
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64String = e.target.result;
            document.getElementById('external-proof-img').src = base64String;
            currentExternalProofBase64 = base64String.split(',')[1];
            
            document.getElementById('external-proof-placeholder').classList.add('hidden');
            document.getElementById('external-proof-preview').classList.remove('hidden');
            document.getElementById('external-proof-preview').classList.add('flex');
            
            document.getElementById('btn-submit-proof').classList.remove('hidden');
            document.getElementById('btn-submit-proof').disabled = false;
        };
        reader.readAsDataURL(file);
    }
}

// JAVIS UPDATE: ฟังก์ชันส่งหลักฐาน แจ้งเตือน และรีโหลดหน้าจอเพื่ออัปเดตสถานะ Pending
function submitExternalProof() {
    if (!currentExternalProofBase64) return;
    
    const btn = document.getElementById('btn-submit-proof');
    btn.disabled = true;
    btn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังส่งหลักฐาน...';
    
    const section = currentLesson.sections[currentSectionIndex];
    const payload = {
        sectionId: String(section.SectionID).trim(),
        imageData: currentExternalProofBase64,
        imageMimeType: currentExternalProofMimeType
    };
    
    google.script.run
        .withSuccessHandler(function(res) {
            if (res.status === 'success') {
                showToast('ส่งหลักฐานเรียบร้อย รอแอดมินตรวจ!', 'success');
                // โหลดข้อมูลล่าสุดมาอัปเดตสถานะ (เพื่อเปลี่ยนปุ่มเริ่มเรียนเป็น รอตรวจ)
                google.script.run.withSuccessHandler(function(newData) {
                    if(newData) {
                       studentData.userInfo = newData.userInfo;
                       lessons.length = 0;
                       newData.lessons.forEach(function(l){ lessons.push(l); });
                       currentLesson = lessons.find(function(l){ return l.LessonID === currentLesson.LessonID; });
                       playSection(currentLesson.LessonID, currentSectionIndex); // วาดหน้าจอกล่อง External ใหม่
                    }
                }).getStudentData();
            } else {
                showToast('เกิดข้อผิดพลาด: ' + res.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'ส่งหลักฐานให้แอดมินตรวจสอบ';
            }
        })
        .withFailureHandler(function(err) {
            showToast('การเชื่อมต่อล้มเหลว', 'error');
            btn.disabled = false;
            btn.innerHTML = 'ส่งหลักฐานให้แอดมินตรวจสอบ';
        })
        .submitExternalProof(payload);
}

    startQuiz();
}

function startQuiz() {
    const section = currentLesson.sections[currentSectionIndex];
    views.quiz.innerHTML = '<div class="text-center py-20"><svg class="animate-spin h-10 w-10 text-[#31c1d7] mx-auto mb-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><p class="text-slate-500 font-bold">กำลังโหลดข้อสอบ...</p></div>';
    showView('quiz');
    
    google.script.run
        .withSuccessHandler(function(questions) {
            quizQuestions = questions;
            quizAnswers = new Array(questions.length).fill(null);
            renderQuiz();
        })
        .getQuiz(section.SectionID);
}

function renderQuiz() {
    if (!quizQuestions || quizQuestions.length === 0) {
        views.quiz.innerHTML = '<div class="bg-white p-12 rounded-[2rem] shadow-xl text-center max-w-2xl mx-auto"><p class="text-slate-500 mb-6 font-medium text-lg">ไม่พบข้อสอบสำหรับบทเรียนนี้</p><button onclick="showView(\'lessonList\')" class="px-6 py-3 bg-[#31c1d7] text-white font-bold rounded-xl hover:bg-[#1eb0c6]">กลับหน้าหลัก</button></div>';
        return;
    }

    const safeLessonId = escapeJsString(currentLesson.LessonID);
    
    let html = '<div class="max-w-3xl mx-auto bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-100">' +
        '<div class="bg-[#31c1d7] px-8 py-6 text-white">' +
        '<h2 class="text-2xl font-black mb-1">แบบทดสอบ</h2><p class="opacity-90 font-medium">ทดสอบความเข้าใจจากเนื้อหา</p></div>' +
        '<div class="p-8 sm:p-10 space-y-10">';

    quizQuestions.forEach(function(q, idx) {
        html += '<div class="quiz-item">' +
            '<h3 class="text-[17px] font-bold text-slate-800 mb-5 leading-relaxed"><span class="text-[#31c1d7] mr-2">' + (idx + 1) + '.</span>' + escapeHtml(q.question) + '</h3>';
        
        if (q.options && q.options.length > 0) {
            html += '<div class="space-y-3">';
            q.options.forEach(function(opt) {
                const isSelected = quizAnswers[idx] === opt;
                const btnClass = isSelected ? 'border-[#31c1d7] bg-[#31c1d7]/5 text-[#31c1d7] shadow-sm' : 'text-slate-600 hover:border-slate-300';
                
                const safeJsOpt = escapeJsString(opt);
                const safeHtmlOpt = escapeHtml(opt);
                
                html += '<button onclick="selectOption(' + idx + ', \'' + safeJsOpt + '\')" class="w-full text-left px-6 py-4 rounded-xl border-2 ' + btnClass + ' font-medium transition-all text-[15px]">' + safeHtmlOpt + '</button>';
            });
            html += '</div>';
        } else {
            const currentAns = quizAnswers[idx] || '';
            const safeHtmlAns = escapeHtml(currentAns);
            html += '<input type="text" id="subjective-ans-' + idx + '" onchange="selectOption(' + idx + ', this.value)" value="' + safeHtmlAns + '" placeholder="พิมพ์คำตอบของคุณที่นี่..." class="w-full px-6 py-4 rounded-xl border-2 border-slate-200 focus:border-[#31c1d7] outline-none transition-colors font-medium text-[15px] text-slate-700">';
        }
        html += '</div>';
    });

    html += '</div><div class="px-8 py-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center">' +
        '<button onclick="playSection(\'' + safeLessonId + '\', ' + currentSectionIndex + ')" class="text-slate-500 font-bold hover:text-slate-800 transition-colors">กลับไปดูเนื้อหา</button>' +
        '<button onclick="submitQuiz()" class="px-8 py-3.5 bg-slate-800 text-white font-bold rounded-xl hover:bg-slate-900 transition-all shadow-md">ส่งคำตอบ</button>' +
        '</div></div>';
    
    views.quiz.innerHTML = html;
}

function selectOption(qIndex, answerValue) {
    quizAnswers[qIndex] = answerValue.trim();
    if (quizQuestions[qIndex].options && quizQuestions[qIndex].options.length > 0) {
        renderQuiz(); 
    }
}

function submitQuiz() {
    if (quizAnswers.some(function(a) { return a === null || a === ''; })) {
        showToast('กรุณาตอบคำถามให้ครบทุกข้อ', 'error');
        return;
    }

    let score = 0;
    const total = quizQuestions.length;

    quizQuestions.forEach(function(q, idx) {
        const userAns = quizAnswers[idx].toLowerCase();
        const correctAnswers = q.answer.toLowerCase().split(',').map(function(s) { return s.trim(); }).filter(Boolean);
        const isCorrect = correctAnswers.some(function(ans) { return userAns === ans || userAns.includes(ans); });
        
        if (isCorrect) score++;
    });

    const section = currentLesson.sections[currentSectionIndex];
    const sectionId = String(section.SectionID).trim();
    const scoreData = { sectionId: sectionId, score: score, totalQuestions: total };
    
    const alreadyPassed = section.quizScore && (section.quizScore.Score / section.quizScore.TotalQuestions) >= 0.5;

    views.quiz.innerHTML = '<div class="text-center py-20"><svg class="animate-spin h-10 w-10 text-[#31c1d7] mx-auto mb-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><p class="text-slate-500 font-bold">กำลังประมวลผล...</p></div>';

    google.script.run
        .withSuccessHandler(function(response) {
            if (response.status === 'success') {
                if (response.passed) {
                    
                    section.quizScore = { Score: score, TotalQuestions: total };
                    
                    if (!alreadyPassed) {
                        let qp = parseInt(section.QuizPoints, 10);
                        if (isNaN(qp)) qp = 50;
                        userInfo.totalBN = (parseInt(userInfo.totalBN, 10) || 0) + qp;
                        
                        cachedLeaderboardData = null;
                        fetchHomeLeaderboard();
                        if (typeof window.updateNavbarRank === 'function') window.updateNavbarRank(null, qp);
                    }
                }
                showQuizResult(score, total, response.passed, !alreadyPassed);
            }
        })
        .saveQuizScore(scoreData);
}

function showQuizResult(score, total, passed, isNewPass) {
    const percent = Math.round((score / total) * 100);
    const section = currentLesson.sections[currentSectionIndex];
    let qp = parseInt(section.QuizPoints, 10);
    if (isNaN(qp)) qp = 50;
    
    let icon, title, desc, btnClass, btnText;

    if (passed) {
        icon = '<div class="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><svg class="w-12 h-12 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>';
        title = '<h2 class="text-3xl font-black text-slate-800 mb-2">สอบผ่าน! เยี่ยมมาก</h2>';
        
        if (isNewPass) {
            desc = '<div class="inline-flex items-center px-4 py-2 bg-violet-50 text-violet-600 border border-violet-200 rounded-xl mb-4 shadow-sm"><span class="text-xl mr-2">🎁</span><span class="font-bold">ได้รับโบนัสข้อสอบ +' + qp + ' BN</span></div><p class="text-slate-500 text-lg">คุณทำคะแนนได้ดีมาก ความรู้แน่นเปรี๊ยะ</p>';
        } else {
            desc = '<div class="inline-flex items-center px-4 py-2 bg-slate-800 text-slate-300 rounded-xl mb-4 shadow-sm"><span class="font-bold text-sm">คุณเคยรับโบนัสจากแบบทดสอบนี้ไปแล้ว</span></div><p class="text-slate-500 text-lg">เก่งมากที่กลับมาทบทวนความรู้</p>';
        }
        
        btnClass = 'bg-[#31c1d7] hover:bg-[#1eb0c6] shadow-lg shadow-[#31c1d7]/30';
        btnText = 'กลับหน้าหลัก';
    } else {
        icon = '<div class="w-24 h-24 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><svg class="w-12 h-12 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg></div>';
        title = '<h2 class="text-3xl font-black text-slate-800 mb-2">เกือบผ่านแล้ว!</h2>';
        desc = '<p class="text-slate-500 text-lg">ทบทวนเนื้อหาอีกนิด แล้วลองใหม่นะ</p>';
        btnClass = 'bg-slate-800 hover:bg-slate-900 shadow-lg';
        btnText = 'ทบทวนเนื้อหา & สอบใหม่';
    }

    let html = '<div class="max-w-lg mx-auto bg-white rounded-[2rem] shadow-xl p-10 text-center border border-slate-100 animate-fade-slide-up">' +
        icon + title + desc +
        '<div class="my-8 p-6 bg-slate-50 rounded-2xl border border-slate-100">' +
        '<div class="text-5xl font-black ' + (passed ? 'text-emerald-500' : 'text-rose-500') + ' mb-2">' + percent + '%</div>' +
        '<div class="text-sm font-bold text-slate-400 uppercase tracking-widest">คะแนน ' + score + ' / ' + total + '</div>' +
        '</div>';

    const safeLessonId = escapeJsString(currentLesson.LessonID);

    if (passed) {
        const lessonStats = getLessonProgressStats(currentLesson);
        // ถ้าคอร์สเรียนจบ 100% ให้แสดงปุ่มดาวน์โหลดใบประกาศ
        if (lessonStats.isCompleted) {
             html += '<button onclick="downloadCertificate(\'' + safeLessonId + '\')" class="w-full px-6 py-4 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl transition-all text-lg shadow-lg mb-3">🎓 ดาวน์โหลดใบประกาศ</button>';
        }
        html += '<button onclick="showView(\'lessonList\'); renderLessonList(); renderMyCourses();" class="w-full px-6 py-4 ' + btnClass + ' text-white font-bold rounded-xl transition-all text-lg">' + btnText + '</button>';
    } else {
        html += '<button onclick="playSection(\'' + safeLessonId + '\', ' + currentSectionIndex + ')" class="w-full px-6 py-4 ' + btnClass + ' text-white font-bold rounded-xl transition-all text-lg">' + btnText + '</button>';
    }
    
    html += '</div>';
    views.quiz.innerHTML = html;
}
</script>
