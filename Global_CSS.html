<style>
  /* =========================================
     GLOBAL STYLES (Future Skill Theme)
     Primary Color: #31c1d7 (Cyan)
     Background: Clean Slate / Soft White
  ========================================= */
  body { 
    font-family: 'Sarabun', sans-serif; 
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    color: #334155; 
    background-color: #f8fafc;
  }

  /* --- Custom Scrollbar ทันสมัย --- */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent; 
  }
  ::-webkit-scrollbar-thumb {
    background: #cbd5e1; 
    border-radius: 10px;
    transition: background 0.3s;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #31c1d7; 
  }

  /* --- Animations --- */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-slide-up {
    animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  /* --- Modern Cards (สไตล์เว็บเรียนออนไลน์) --- */
  .modern-card {
    background: #ffffff;
    border-radius: 1.5rem;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid #f1f5f9;
    overflow: hidden;
  }
  .modern-card:hover {
    box-shadow: 0 25px 35px -5px rgba(49, 193, 215, 0.12); /* เรืองแสงสีฟ้าอ่อนๆ */
    transform: translateY(-6px);
    border-color: rgba(49, 193, 215, 0.3);
  }

  /* --- Quiz Option Buttons --- */
  .option-btn {
    transition: all 0.3s ease;
    border: 2px solid #f1f5f9;
    background-color: #ffffff;
    border-radius: 1rem;
  }
  .option-btn:hover:not(:disabled) {
    border-color: #31c1d7;
    background-color: rgba(49, 193, 215, 0.04);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px -4px rgba(49, 193, 215, 0.15);
  }
  .option-btn.correct { 
    border-color: #10b981; 
    background-color: #ecfdf5;
    color: #065f46;
  }
  .option-btn.incorrect { 
    border-color: #f43f5e; 
    background-color: #fff1f2;
    color: #9f1239;
  }

  /* --- Video Container --- */
  #player-container { 
    position: relative; 
    padding-bottom: 56.25%; 
    height: 0; 
    overflow: hidden; 
    background: #0f172a; 
    border-radius: 1.5rem;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255,255,255,0.1);
  }
</style>
