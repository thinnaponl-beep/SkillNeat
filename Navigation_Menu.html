<script>
  // ดึง Profile จากตัวแปรฝั่งเซิร์ฟเวอร์โดยตรง (ตัวแปรนี้มีอยู่แล้วในทุกๆ หน้า รวมถึงหน้า Admin)
  const serverUserProfile = <?!= typeof userProfile !== 'undefined' ? JSON.stringify(userProfile) : '{}' ?>;

  window.currentTotalBN = 0;
  window.initialCalcDone = false;

  // --- ลอจิกการคำนวณ 5 ระดับ (Rank) ---
  function getUserRank(bn) {
      if (bn >= 1000) return { name: 'Master', th: 'ปรมาจารย์', icon: '👑', color: 'text-amber-500', bg: 'bg-amber-50', border: 'border-amber-200', next: null, min: 1000 };
      if (bn >= 600) return { name: 'Expert', th: 'ผู้เชี่ยวชาญ', icon: '💎', color: 'text-indigo-500', bg: 'bg-indigo-50', border: 'border-indigo-200', next: 1000, min: 600 };
      if (bn >= 300) return { name: 'Scholar', th: 'ผู้ใฝ่รู้', icon: '🥇', color: 'text-[#31c1d7]', bg: 'bg-[#31c1d7]/10', border: 'border-[#31c1d7]/30', next: 600, min: 300 };
      if (bn >= 100) return { name: 'Explorer', th: 'นักสำรวจ', icon: '🥈', color: 'text-sky-500', bg: 'bg-sky-50', border: 'border-sky-200', next: 300, min: 100 };
      return { name: 'Novice', th: 'ผู้เริ่มต้น', icon: '🥉', color: 'text-slate-500', bg: 'bg-slate-50', border: 'border-slate-200', next: 100, min: 0 };
  }

  // ระบบอัปเดตคะแนนแบบ Real-time ดึงค่าจากชีทโดยตรง!
  window.updateNavbarRank = function(liveData, addPoints = 0) {
      
      // ถ้าระบบสั่งบวกคะแนน (เช่น ตอนเรียนจบ หรือสอบผ่าน) ก็บวกเข้าตัวเลขที่โชว์อยู่ได้เลย
      if (addPoints > 0) {
          window.currentTotalBN += addPoints;
      } 
      // ถ้าโหลดเว็บครั้งแรก (รีเฟรชหน้า)
      else if (!window.initialCalcDone) {
          let data = liveData; 
          if (!data) { 
              const serverDataElement = document.getElementById('server-data');
              if (serverDataElement) {
                  try { data = JSON.parse(serverDataElement.textContent || '{}'); } catch(e) {}
              }
          }
          
          // 1. ลองดึงคะแนนจากตัวแปร Profile หลักก่อน (การันตีว่าได้ผลในทุกหน้า แม้แต่หน้า Admin)
          if (serverUserProfile && serverUserProfile.TotalBN !== undefined && serverUserProfile.TotalBN !== '') {
              window.currentTotalBN = parseInt(serverUserProfile.TotalBN) || 0;
          } 
          // 2. ถ้าหาไม่เจอ ค่อยไปควานหาใน Data ของหน้า Student
          else if (data && data.userInfo && data.userInfo.profile && data.userInfo.profile.TotalBN !== undefined && data.userInfo.profile.TotalBN !== '') {
              window.currentTotalBN = parseInt(data.userInfo.profile.TotalBN) || 0;
          } 
          // 3. หรือดึงจากตัวแปรที่ Code.gs อุตส่าห์บวกสดๆ มาให้
          else if (data && data.userInfo && data.userInfo.totalBN !== undefined) {
              window.currentTotalBN = parseInt(data.userInfo.totalBN) || 0;
          } 
          // 4. ท้ายที่สุด ถ้าหาไม่ได้จริงๆ ถึงจะเป็น 0
          else {
              window.currentTotalBN = 0;
          }
          
          window.initialCalcDone = true;
      }
      
      const rank = getUserRank(window.currentTotalBN);
      const rankBadgeContainer = document.getElementById('nav-rank-badge');
      
      // อัปเดตขึ้น UI ที่ Navbar
      if (rankBadgeContainer) {
          rankBadgeContainer.innerHTML = `
              <a href="<?= baseUrl ?>?page=profile" class="flex items-center space-x-2 px-3 py-1.5 ${rank.bg} ${rank.border} border rounded-xl shadow-sm cursor-pointer hover:scale-105 transition-transform" title="คะแนนสะสม: ${window.currentTotalBN} BN">
                  <span class="text-xl leading-none drop-shadow-sm">${rank.icon}</span>
                  <div class="flex flex-col justify-center">
                      <span class="text-[10px] font-black ${rank.color} uppercase tracking-wider leading-none">${rank.name}</span>
                      <span class="text-[11px] font-bold text-slate-600 leading-none mt-1">${window.currentTotalBN} BN</span>
                  </div>
              </a>
          `;
      }
      
      // ส่งข้อมูลอัปเดตนี้ไปยังหน้า Profile_View ด้วยเพื่อให้การ์ดอัปเดตตาม
      window.userRankData = { bn: window.currentTotalBN, rank: rank };
      document.dispatchEvent(new CustomEvent('rankDataReady'));
  };

  (function() {
    function updateActiveNav(currentPage, currentTab) {
      const navLinks = document.querySelectorAll('.nav-link');
      navLinks.forEach(link => {
        if (link.getAttribute('data-page') === currentPage && currentTab !== 'mycourses') {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
        if (typeof google !== 'undefined' && google.script && google.script.url) {
            google.script.url.getLocation(function(location) {
                const currentPage = location.parameter.page || 'student';
                const currentTab = location.parameter.tab;
                updateActiveNav(currentPage, currentTab);
            });
        } else {
            const urlParams = new URLSearchParams(window.location.search);
            const currentPage = urlParams.get('page') || 'student';
            const currentTab = urlParams.get('tab');
            updateActiveNav(currentPage, currentTab);
        }
        
        // โหลดคะแนนทันทีเมื่อเปิดหน้าเว็บ
        window.updateNavbarRank();
    });
  })();
</script>
